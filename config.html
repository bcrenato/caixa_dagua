<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações Avançadas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .config-container { background: #1e293b; padding: 20px; border-radius: 20px; max-width: 450px; margin: 20px auto; }
        .setup-group { background: #0f172a; padding: 10px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        input { width: 70%; padding: 8px; margin: 5px; border-radius: 5px; border: none; text-align: center; }
        label { display: block; font-size: 12px; color: #94a3b8; }
        h3 { margin: 5px 0; color: #00c6ff; }
        button { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-save { background: #22c55e; color: white; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="config-container">
        <h2 style="text-align: center;">⚙️ CONFIGURAÇÃO</h2>
        
        <div class="setup-group">
            <label>VALOR DO SENSOR AGORA (A0):</label>
            <h3 id="displayBruto">---</h3>
            <button onclick="capturar('min')">CAPTURAR VAZIO (0%)</button>
            <button onclick="capturar('max')">CAPTURAR CHEIO (100%)</button>
        </div>

        <div class="setup-group">
            <label>ALTURA ÚTIL DA CAIXA (cm)</label>
            <input type="number" id="h" placeholder="Ex: 76">
            <label>RAIO DA BASE (cm)</label>
            <input type="number" id="rb" placeholder="Ex: 58">
            <label>RAIO DO TOPO (cm)</label>
            <input type="number" id="rt" placeholder="Ex: 75.5">
        </div>

        <button class="btn-save" onclick="salvar()">SALVAR TUDO</button>
        <button style="background: #ef4444; color: white;" onclick="window.location.href='index.html'">VOLTAR</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQipZjlc86GtZGx3_aoyCT-jDrZ1oYyYM",
            authDomain: "monitor-caixa-agua-ff63a.firebaseapp.com",
            databaseURL: "https://monitor-caixa-agua-ff63a-default-rtdb.firebaseio.com",
            projectId: "monitor-caixa-agua-ff63a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let valorRaw = 0;
        let inputMin = 0, inputMax = 1023;

        db.ref('valor_bruto').on('value', (s) => {
            valorRaw = s.val();
            document.getElementById('displayBruto').innerText = valorRaw;
        });

        function capturar(t) {
            if(t === 'min') inputMin = valorRaw;
            if(t === 'max') inputMax = valorRaw;
            alert(t + " capturado: " + valorRaw);
        }

        function salvar() {
            db.ref('config').set({
                minimo: inputMin,
                maximo: inputMax,
                altura: parseFloat(document.getElementById('h').value),
                raioBase: parseFloat(document.getElementById('rb').value),
                raioTopo: parseFloat(document.getElementById('rt').value)
            }).then(() => alert("Configurações aplicadas!"));
        }
    </script>
</body>
</html>
