<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Consumo - Caixa D’Água</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container-consumo { width: 95%; max-width: 500px; margin: 20px auto; }
        .card-gasto { background: #1e293b; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input, select { padding: 12px; border-radius: 8px; width: 90%; margin-bottom: 12px; background: #0f172a; color: white; border: 1px solid #475569; font-size: 16px; }
        .btn-medir { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 95%; font-size: 16px; transition: 0.3s; }
        .ranking-bar { margin-bottom: 15px; text-align: left; }
        .bar-bg { width: 100%; background: #334155; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; transition: width 0.6s ease-out; }

        @keyframes pulsarRed {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .piscar-alerta {
            animation: pulsarRed 0.8s infinite !important;
            color: #ff4d4d !important;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5) !important;
            display: inline-block !important;
        }

        .btn-danger { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .btn-delete-item { background: none; border: none; color: #ef4444; cursor: pointer; font-weight: bold; font-size: 16px; padding: 0 5px; }
        
        /* Estilo do Filtro de Data */
        .filtro-data { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #3b82f6; }
        .filtro-data label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container-consumo">
    <div class="titulo-box">
        <h2 class="titulo-principal">GESTÃO DE ÁGUA</h2>
        <p class="subtitulo">Controle de Gastos Individuais</p>
    </div>

    <div class="card-gasto">
        <h3>Nova Medição</h3>
        <input type="text" id="nomePessoa" placeholder="Nome da Pessoa">
        <select id="dispositivoGasto" onchange="verificarDispositivo()">
            <option value="Chuveiro Suíte">Chuveiro Suíte</option>
            <option value="Chuveiro Geral">Chuveiro Geral</option>
            <option value="Máquina de Lavar">Máquina de Lavar</option>
            <option value="Torneira Geral">Torneira Geral</option>
        </select>
        <div id="displayConsumo" style="font-size: 32px; font-weight: bold; color: #ffc107; margin: 15px 0;">0.0 L</div>
        <button id="btnMedir" onclick="toggleMedicao()" class="btn-medir" style="background: #22c55e; color: white;">INICIAR MEDIÇÃO</button>
    </div>

    
<div id="resumoDiario" class="card-gasto" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #3b82f6;">
    <h4 style="color: #94a3b8; margin: 0; font-size: 14px; text-transform: uppercase;">Consumo Total do Dia</h4>
    <div id="totalLitrosDia" style="font-size: 38px; font-weight: bold; color: #22c55e; margin: 5px 0;">0.0 L</div>
    <p id="labelDataResumo" style="font-size: 12px; color: #64748b; margin: 0;">Carregando...</p>
</div>

    
    <div class="filtro-data">
        <label>🔍 Filtrar Ranking por Data:</label>
        <input type="date" id="filtroCalendario" onchange="atualizarInterface()">
        <button onclick="limparFiltroData()" style="background: #475569; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; width: 100%;">Mostrar Tudo (Ranking Semanal)</button>
    </div>

    <div class="card-gasto">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 id="tituloRanking" style="color: #00c6ff; margin: 0;">🏆 Ranking Semanal</h3>
            <button class="btn-danger" onclick="limparHistoricoTotal()">Zerar Mês</button>
        </div>
        <div id="rankingConsumo"></div>
    </div>

    <div class="card-gasto">
        <h3>Histórico Recente</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <button class="btn-medir" style="background: #475569; color: white; margin-top: 10px;" onclick="window.location.href='index.html'">VOLTAR AO MONITOR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="consumo.js"></script>
</body>
</html>
