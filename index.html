<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitor Caixa d'Água</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    .card-chart {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    #water {
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #0077ff, #00c6ff);
      transition: height 0.3s;
    }

    .tank {
      width: 100%;
      height: 200px;
      border: 2px solid #ccc;
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }

    canvas {
      width: 100% !important;
      height: 250px !important;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>💧 Monitor Caixa d'Água</h2>

  <div id="alertaGrande" class="card" style="display:none;"></div>

  <!-- TANQUE -->
  <div class="tank">
    <div id="water"></div>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h3 id="percent">0%</h3>
    <p id="status">Carregando...</p>
    <h2 id="litrosText">0 L</h2>
  </div>

  <!-- 💧 NOVO: GASTO HOJE -->
  <div class="card">
    <h3>💧 GASTO HOJE</h3>
    <h1 id="gastoHoje">0 L</h1>
  </div>

  <!-- 📊 NOVO: GRÁFICO -->
  <div class="card-chart">
    <h3>📊 Consumo dos dias</h3>
    <canvas id="graficoConsumo"></canvas>
  </div>

</div>

<!-- Seu script -->
<script src="script.js"></script>

</body>
</html>
