<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Caixa D’Água</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <div class="titulo-box" style="position: relative;">
  <h2 class="titulo-principal">CAIXA D’ÁGUA</h2>
  <p class="subtitulo">Marechal Castelo Branco</p>


  <button onclick="window.location.href='consumo.html'" style="width: 100%; padding: 15px; background: #3b82f6; color: white; border-radius: 12px; border: none; font-weight: bold; margin-top: 15px; cursor: pointer;">
    📊 VER CONSUMO E RANKING
  </button>



    
  <a href="config.html" style="position: absolute; right: 0; top: 0; text-decoration: none; font-size: 24px;">⚙️</a>
</div>

  <div class="card-tank">
      <div class="tank">
    <div class="water" id="water">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
    </div>

    <div id="alertaGrande" class="alerta-grande"></div>

    <img src="caixa.png" class="tank-img">
    <div class="glass"></div>
</div>
      <h1 id="percent">0%</h1>
      <h2 id="litrosText" style="font-size: 22px; margin: 0; font-weight: bold; opacity: 0.9;">0 L</h2>
      <p id="status">Normal</p>
  </div>

  <div class="card-chart">
      <canvas id="grafico"></canvas>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>

</body>
</html>
