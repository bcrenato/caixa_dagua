<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Caixa D’Água</title>
<link rel="stylesheet" href="style.css">
<style>
  .btn-filtro { background: #1e293b; color: #94a3b8; border: 1px solid #3b82f6; padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; transition: 0.3s; }
  .btn-filtro.active { background: #3b82f6; color: white; }
  
  /* Estilo do botão de atalho restaurado */
  .btn-navegacao { width: 100%; padding: 12px; background: #334155; color: white; border-radius: 12px; border: 1px solid #475569; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 13px; transition: 0.3s; }
  .btn-navegacao:hover { background: #475569; }
</style>
</head>
<body>

<div class="dashboard">
  <div class="titulo-box" style="position: relative;">
    <h2 class="titulo-principal">CAIXA D’ÁGUA</h2>
    <p class="subtitulo">Marechal Castelo Branco</p>
    <a href="config.html" style="position: absolute; right: 0; top: 0; text-decoration: none; font-size: 24px;">⚙️</a>
  </div>

  <div class="card-tank">
      <div class="tank">
        <div class="water" id="water">
            <div class="wave wave1"></div>
            <div class="wave wave2"></div>
        </div>
        <div id="alertaGrande" class="alerta-grande"></div>
        <img src="caixa.png" class="tank-img">
        <div class="glass"></div>
      </div>
      <h1 id="percent">0%</h1>
      <h2 id="litrosText" style="font-size: 22px; margin: 0; font-weight: bold; opacity: 0.9;">0 L</h2>
      <p id="status">Normal</p>
  </div>

  <button onclick="window.location.href='consumo.html'" class="btn-navegacao">
    📊 DETALHES E HISTÓRICO DE GASTOS
  </button>

  <div class="card-chart" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #3b82f6; padding: 15px; margin-top: 15px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <h4 id="labelGasto" style="color: #94a3b8; margin: 0; font-size: 11px; text-transform: uppercase;">Gasto Hoje</h4>
          <div style="display: flex; gap: 5px;">
              <button class="btn-filtro active" id="btnHoje" onclick="mudarFiltroHome('hoje')">HOJE</button>
              <button class="btn-filtro" id="btnSemana" onclick="mudarFiltroHome('semana')">7D</button>
              <button class="btn-filtro" id="btnMes" onclick="mudarFiltroHome('mes')">30D</button>
          </div>
      </div>
      <div id="totalLitrosHome" style="font-size: 36px; font-weight: bold; color: #22c55e; text-align: center; margin: 5px 0;">0.0 L</div>
      <p style="font-size: 10px; color: #64748b; text-align: center; margin: 0;">Cálculo automático via sensor</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>

</body>
</html>
